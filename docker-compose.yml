services:
  mysql:
    image: mysql:8.4
    container_name: dohwa-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dohwa_dev_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dohwa}
      MYSQL_USER: ${MYSQL_USER:-dohwa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dohwa_dev}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-dohwa_dev_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
